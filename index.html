<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC 레인보우">
<title>비트코인 레인보우 · 실시간</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23f7931a'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%E2%82%BF%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  :root{
    --bg:#0b0e14; --card:#141925; --card2:#1b2230; --line:#232c3d;
    --txt:#e8edf5; --sub:#8c98ad; --up:#ff4d4f; --down:#4d9fff;
    --accent:#f7931a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    padding:14px 12px 40px;max-width:760px;margin:0 auto}
  header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  header .btc{width:34px;height:34px;background:var(--accent);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:20px}
  header h1{font-size:17px;margin:0;font-weight:700}
  header .sub{font-size:11px;color:var(--sub);margin-top:1px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:12px}
  .price-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .price{font-size:32px;font-weight:800;letter-spacing:-0.5px}
  .chg{font-size:15px;font-weight:700}
  .price-sub{font-size:12px;color:var(--sub);margin-top:4px}
  #chart{width:100%;height:380px}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center}
  .gauge-label{font-size:20px;font-weight:800;margin-top:2px;text-align:center}
  .gauge-pos{font-size:13px;color:var(--sub);margin-top:2px}
  .signal-big{font-size:26px;font-weight:800;text-align:center;margin:6px 0 2px}
  .signal-action{font-size:14px;color:var(--sub);text-align:center;line-height:1.5}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .metric{background:var(--card2);border-radius:12px;padding:12px}
  .metric .k{font-size:11px;color:var(--sub);margin-bottom:4px}
  .metric .v{font-size:17px;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--sub);font-weight:600}
  .dot{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}
  .cur-row{background:rgba(247,147,26,0.12);font-weight:700}
  .foot{font-size:11px;color:var(--sub);line-height:1.7;margin-top:6px}
  .sec-title{font-size:13px;color:var(--sub);font-weight:700;margin:0 0 10px;
    text-transform:uppercase;letter-spacing:0.5px}
  .refresh{position:fixed;right:16px;bottom:16px;background:var(--accent);color:#fff;
    border:none;width:52px;height:52px;border-radius:50%;font-size:22px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);cursor:pointer}
  .stamp{font-size:11px;color:var(--sub);text-align:right;margin-top:8px}
  .live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2ecc71;
    margin-right:5px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<header>
  <div class="btc">₿</div>
  <div>
    <h1>비트코인 레인보우 · 실시간</h1>
    <div class="sub">로그 회귀 밴드 기반 매수·매도 위치 판단</div>
  </div>
</header>

<div class="card">
  <div class="price-row">
    <span class="price" id="price">—</span>
    <span class="chg" id="chg">—</span>
  </div>
  <div class="price-sub"><span class="live"></span><span id="src">시세 불러오는 중…</span></div>
</div>

<div class="card">
  <div class="sec-title">레인보우 위치</div>
  <div class="gauge-wrap">
    <svg id="gauge" width="300" height="175" viewBox="0 0 300 175"></svg>
    <div class="gauge-label" id="bandLabel">—</div>
    <div class="gauge-pos" id="posText">—</div>
  </div>
</div>

<div class="card">
  <div class="sec-title">투자 신호</div>
  <div class="signal-big" id="signalBig">—</div>
  <div class="signal-action" id="signalAction">—</div>
</div>

<div class="card">
  <div class="metrics">
    <div class="metric"><div class="k">공정가치선 (오늘)</div><div class="v" id="mFair">—</div></div>
    <div class="metric"><div class="k">레인보우 배수</div><div class="v" id="mMult">—</div></div>
    <div class="metric"><div class="k">반감기 경과</div><div class="v" id="mHalv">—</div></div>
    <div class="metric"><div class="k">4년 사이클 진행</div><div class="v" id="mCycle">—</div></div>
  </div>
</div>

<div class="card">
  <div class="sec-title">레인보우 밴드 차트</div>
  <div id="chart"></div>
</div>

<div class="card">
  <div class="sec-title">밴드별 신호 기준</div>
  <table id="bandTable"><thead>
    <tr><th>밴드</th><th>위치</th><th>신호</th></tr>
  </thead><tbody></tbody></table>
  <div class="foot">
    ⚠️ 레인보우 밴드는 과거 로그 추세 기반 <b>경험적 보조 지표</b>입니다.
    미래 가격을 보장하지 않으며 투자 자문이 아닙니다.
    밴드 색은 세계 표준(🔴 과열=매도 / 🔵 저평가=매수)을 따릅니다.
  </div>
  <div class="stamp" id="stamp"></div>
</div>

<button class="refresh" id="refreshBtn" title="새로고침">⟳</button>

<script>
/* ===== 1. 앵커 데이터 & 로그 회귀 ===== */
const ANCHORS = [
["2010-07",0.08],["2010-10",0.20],["2010-12",0.30],
["2011-02",1.00],["2011-04",3.00],["2011-06",15],["2011-09",5],["2011-12",4.7],
["2012-03",4.9],["2012-06",6.7],["2012-09",12],["2012-12",13.5],
["2013-03",93],["2013-06",97],["2013-09",140],["2013-11",1120],["2013-12",750],
["2014-03",450],["2014-06",640],["2014-09",385],["2014-12",320],
["2015-03",245],["2015-06",263],["2015-09",236],["2015-12",430],
["2016-03",416],["2016-06",673],["2016-09",610],["2016-12",963],
["2017-03",1080],["2017-06",2480],["2017-09",4340],["2017-11",10200],["2017-12",14000],
["2018-03",6900],["2018-06",6400],["2018-09",6600],["2018-12",3740],
["2019-03",4100],["2019-06",10800],["2019-09",8290],["2019-12",7200],
["2020-03",6440],["2020-06",9140],["2020-09",10780],["2020-12",28990],
["2021-03",58800],["2021-06",35000],["2021-09",43800],["2021-11",57000],["2021-12",46200],
["2022-03",45500],["2022-06",19900],["2022-09",19400],["2022-11",17150],["2022-12",16550],
["2023-03",28450],["2023-06",30450],["2023-09",26900],["2023-12",42250],
["2024-03",71300],["2024-06",62700],["2024-09",63300],["2024-11",96400],["2024-12",93400],
["2025-03",82500],["2025-06",107100],["2025-09",118000],["2025-12",125000],
];
const GENESIS = new Date("2009-01-03").getTime();
const DAY = 86400000;
function daysFromDate(dateObj){ return (dateObj.getTime()-GENESIS)/DAY; }
function daysFromYM(ym){ return daysFromDate(new Date(ym+"-15")); }

// 회귀: log10(price) = m*ln(days) + b
let sx=0,sy=0,sxx=0,sxy=0,n=ANCHORS.length;
for(const [ym,p] of ANCHORS){
  const x=Math.log(daysFromYM(ym)), y=Math.log10(p);
  sx+=x; sy+=y; sxx+=x*x; sxy+=x*y;
}
const M=(n*sxy-sx*sy)/(n*sxx-sx*sx);
const B=(sy-M*sx)/n;
const A=0.72;                 // 밴드 반폭 (log10) — 사이클 고점/저점 보정값
function fairAt(days){ return Math.pow(10, M*Math.log(days)+B); }
function fairToday(){ return fairAt(daysFromDate(new Date())); }

/* ===== 2. 밴드 정의 (아래=저평가/파랑 → 위=과열/빨강) ===== */
const BANDS = [ // offset下限, offset上限, 색, 라벨, 신호, 액션
 [ 0.560, 0.720,"#c62828","극단적 과열","🔴 강력 매도","사이클 고점권. 익절·비중 축소 우선."],
 [ 0.400, 0.560,"#f4511e","버블","🔴 매도","과열 진입. 분할 매도 지속."],
 [ 0.240, 0.400,"#ffa726","버블 주의","🟠 분할 매도","차익 실현 시작 구간."],
 [ 0.080, 0.240,"#ffd54f","다소 과열","🟡 관망","평균 이상. 신규 매수 자제."],
 [-0.080, 0.080,"#d4e157","중립","🟢 보유(HODL)","공정가치 부근. 현 비중 유지."],
 [-0.240,-0.080,"#9ccc65","여전히 저렴","🟢 매수/보유","평균 이하. 분할 매수 가능."],
 [-0.400,-0.240,"#26a69a","축적","🔵 분할 매수","저평가. 적립식 매집 구간."],
 [-0.560,-0.400,"#1e88e5","저평가","🔵 매수","바닥권 접근. 매수 확대."],
 [-0.720,-0.560,"#0d47a1","파이어세일","🔵 강력 매수","역사적 최저평가. 적극 매집."],
];
function bandForPos(pos){ // pos 0(하단)~100(상단)
  const off = (pos/100)*(2*A) - A;
  for(const bnd of BANDS){ if(off>=bnd[0] && off<bnd[1]) return bnd; }
  return off>=A ? BANDS[0] : BANDS[BANDS.length-1];
}
function posFromPrice(price, days){
  const off = Math.log10(price) - Math.log10(fairAt(days));
  return Math.max(0, Math.min(100, ((off+A)/(2*A))*100));
}

/* ===== 3. 레인보우 밴드 차트 (Plotly) ===== */
function buildChart(livePrice){
  const start=new Date("2011-01-15"), end=new Date("2030-12-15");
  const dates=[], daysArr=[];
  let d=new Date(start);
  while(d<=end){ dates.push(new Date(d)); daysArr.push(daysFromDate(d)); d.setMonth(d.getMonth()+1); }
  const boundaries=[]; // 10개 경계 offset
  for(let i=0;i<=9;i++) boundaries.push(-A + i*(2*A/9));
  const traces=[];
  // 하단 기준선(투명)
  traces.push({x:dates, y:daysArr.map(dd=>fairAt(dd)*Math.pow(10,boundaries[0])),
    mode:'lines', line:{width:0}, hoverinfo:'skip', showlegend:false});
  for(let i=0;i<9;i++){
    const upper=daysArr.map(dd=>fairAt(dd)*Math.pow(10,boundaries[i+1]));
    traces.push({x:dates, y:upper, mode:'lines', line:{width:0},
      fill:'tonexty', fillcolor:BANDS[8-i][2]+"cc", hoverinfo:'skip', showlegend:false});
  }
  // 실제 가격(앵커)
  traces.push({x:ANCHORS.map(a=>new Date(a[0]+"-15")), y:ANCHORS.map(a=>a[1]),
    mode:'lines', line:{color:'#0b0e14', width:1.8}, name:'BTC', hoverinfo:'skip', showlegend:false});
  // 현재 라이브 점
  if(livePrice){
    traces.push({x:[new Date()], y:[livePrice], mode:'markers',
      marker:{color:'#fff', size:11, line:{color:'#000', width:2}},
      name:'현재', hovertemplate:'현재 $%{y:,.0f}<extra></extra>'});
  }
  const layout={
    margin:{l:52,r:10,t:8,b:28}, paper_bgcolor:'#141925', plot_bgcolor:'#141925',
    font:{color:'#8c98ad', size:10},
    xaxis:{gridcolor:'#232c3d', range:['2011-01-01','2030-12-31']},
    yaxis:{type:'log', gridcolor:'#232c3d', tickprefix:'$', tickformat:'~s',
      range:[Math.log10(0.05), Math.log10(3000000)]},
    showlegend:false, dragmode:false
  };
  Plotly.react('chart', traces, layout, {displayModeBar:false, responsive:true, staticPlot:false});
}

/* ===== 4. 반원 게이지 (SVG) ===== */
function drawGauge(pos){
  const svg=document.getElementById('gauge');
  const cx=150, cy=150, r=120, rin=78;
  let html='';
  // 9색 아크
  for(let i=0;i<9;i++){
    const a0=Math.PI - (i/9)*Math.PI;
    const a1=Math.PI - ((i+1)/9)*Math.PI;
    const x0=cx+r*Math.cos(a0), y0=cy-r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy-r*Math.sin(a1);
    const xi1=cx+rin*Math.cos(a1), yi1=cy-rin*Math.sin(a1);
    const xi0=cx+rin*Math.cos(a0), yi0=cy-rin*Math.sin(a0);
    const col=BANDS[8-i][2];
    html+=`<path d="M${x0} ${y0} A${r} ${r} 0 0 1 ${x1} ${y1} L${xi1} ${yi1} A${rin} ${rin} 0 0 0 ${xi0} ${yi0} Z" fill="${col}"/>`;
  }
  // 바늘
  const ang=Math.PI - (pos/100)*Math.PI;
  const nx=cx+(r-6)*Math.cos(ang), ny=cy-(r-6)*Math.sin(ang);
  html+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>`;
  html+=`<circle cx="${cx}" cy="${cy}" r="8" fill="#fff"/>`;
  html+=`<circle cx="${cx}" cy="${cy}" r="4" fill="#0b0e14"/>`;
  // 양끝 라벨
  html+=`<text x="26" y="168" fill="#4d9fff" font-size="11" font-weight="700">매수</text>`;
  html+=`<text x="248" y="168" fill="#ff4d4f" font-size="11" font-weight="700">매도</text>`;
  svg.innerHTML=html;
}

/* ===== 신호/지표 갱신 ===== */
function fmtUSD(v){ return '$'+Math.round(v).toLocaleString('en-US'); }
function updateUI(price, chgPct, srcName){
  const days=daysFromDate(new Date());
  const fair=fairAt(days);
  const pos=posFromPrice(price, days);
  const band=bandForPos(pos);
  const mult=price/fair;

  document.getElementById('price').textContent=fmtUSD(price);
  const chgEl=document.getElementById('chg');
  if(chgPct!=null){
    const up=chgPct>=0;
    chgEl.textContent=(up?'▲ ':'▼ ')+Math.abs(chgPct).toFixed(2)+'%';
    chgEl.style.color=up?'var(--up)':'var(--down)';   // 국내관례: 상승=빨강
  }
  document.getElementById('src').textContent='출처 '+srcName+' · 60초 자동 갱신';

  drawGauge(pos);
  const bl=document.getElementById('bandLabel');
  bl.textContent=band[3]; bl.style.color=band[2];
  document.getElementById('posText').textContent='위치 '+pos.toFixed(1)+' / 100';
  document.getElementById('signalBig').textContent=band[4];
  document.getElementById('signalBig').style.color=band[2];
  document.getElementById('signalAction').textContent=band[5];

  document.getElementById('mFair').textContent=fmtUSD(fair);
  const mm=document.getElementById('mMult');
  mm.textContent=mult.toFixed(2)+'×';
  mm.style.color = mult>=1?'var(--up)':'var(--down)';

  // 반감기(2024-04-20) 경과 & 4년 사이클
  const halv=new Date("2024-04-20").getTime();
  const dHalv=Math.floor((Date.now()-halv)/DAY);
  document.getElementById('mHalv').textContent=dHalv+'일';
  document.getElementById('mCycle').textContent=(dHalv/1461*100).toFixed(0)+'%';

  buildChart(price);
  document.getElementById('stamp').textContent='마지막 갱신 '+new Date().toLocaleString('ko-KR');
}

/* 밴드 표 */
(function(){
  const tb=document.querySelector('#bandTable tbody');
  BANDS.forEach(bnd=>{
    const lo=((bnd[0]+A)/(2*A)*100).toFixed(0);
    const hi=((bnd[1]+A)/(2*A)*100).toFixed(0);
    tb.insertAdjacentHTML('beforeend',
      `<tr data-lo="${lo}" data-hi="${hi}"><td><span class="dot" style="background:${bnd[2]}"></span>${bnd[3]}</td><td>${lo}–${hi}</td><td>${bnd[4]}</td></tr>`);
  });
})();
function highlightRow(pos){
  document.querySelectorAll('#bandTable tbody tr').forEach(tr=>{
    const lo=+tr.dataset.lo, hi=+tr.dataset.hi;
    tr.classList.toggle('cur-row', pos>=lo && pos<hi);
  });
}

/* ===== 실시간 시세 ===== */
async function fetchPrice(){
  // 1차: CoinGecko (24h 등락 포함)
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true',{cache:'no-store'});
    if(r.ok){ const j=await r.json();
      return {price:j.bitcoin.usd, chg:j.bitcoin.usd_24h_change, src:'CoinGecko'}; }
  }catch(e){}
  // 2차: Binance
  try{
    const r=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT',{cache:'no-store'});
    if(r.ok){ const j=await r.json();
      return {price:parseFloat(j.lastPrice), chg:parseFloat(j.priceChangePercent), src:'Binance'}; }
  }catch(e){}
  return null;
}
async function refresh(){
  const btn=document.getElementById('refreshBtn'); btn.style.transform='rotate(360deg)';
  btn.style.transition='transform .6s';
  const d=await fetchPrice();
  if(d){
    updateUI(d.price, d.chg, d.src);
    highlightRow(posFromPrice(d.price, daysFromDate(new Date())));
  }else{
    document.getElementById('src').textContent='시세 조회 실패 — 네트워크 확인';
  }
  setTimeout(()=>btn.style.transform='rotate(0deg)',650);
}
document.getElementById('refreshBtn').onclick=refresh;

// 서비스워커 등록 (오프라인 지원)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// 초기 렌더 (시세 오기 전 밴드 먼저 표시)
buildChart(null);
refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
